version: '3.8'

services:
  # PostgreSQL database for multi-user setup
  postgres:
    image: postgres:15-alpine
    container_name: iclasspro-postgres
    environment:
      POSTGRES_USER: iclasspro_app
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: iclasspro_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iclasspro_app -d iclasspro_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iclasspro-network

  # Redis for session/cache (optional)
  redis:
    image: redis:7-alpine
    container_name: iclasspro-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iclasspro-network

  # iClassPro Enrollment Dashboard
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iclasspro-app
    ports:
      - "8000:8000"
    environment:
      # Database connection (PostgreSQL)
      DATABASE_URL: "postgresql://iclasspro_app:dev_password_change_me@postgres:5432/iclasspro_db"
      # Or use SQLite for development (comment out DATABASE_URL and uncomment below)
      # DATABASE_URL: "sqlite:///app.db"

      # Session security - For development only
      DASHBOARD_SESSION_SECRET: "dev-session-secret-change-in-production"

      # Encryption key - Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      ENCRYPTION_KEY: "dev-encryption-key-change-in-production"

      # Development settings
      ENVIRONMENT: "development"
      COOKIE_SECURE: "0"  # Disable for local development

      # Concurrency limits
      MAX_CONCURRENT_JOBS: "3"
      MAX_JOBS_PER_USER: "2"

      # Debug mode
      DEBUG: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ./schedules:/app/schedules
    networks:
      - iclasspro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: iclasspro-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - iclasspro-network

volumes:
  postgres_data:
    driver: local

networks:
  iclasspro-network:
    driver: bridge
