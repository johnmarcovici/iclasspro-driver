<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iClassPro Enrollment Dashboard</title>
    <!-- Use PicoCSS for a clean, minimal look without writing custom CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        #terminal {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 1rem;
            border-radius: 5px;
            height: 400px;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
            margin-top: 1rem;
        }
        .status-idle { color: #6c757d; }
        .status-running { color: #ffc107; font-weight: bold;}
        .status-success { color: #28a745; font-weight: bold;}
        .status-error { color: #dc3545; font-weight: bold;}
    </style>
</head>
<body>
    <main class="container">
        <hgroup>
            <h1>iClassPro Enrollment Bot</h1>
            <h2>Automate your class signups</h2>
        </hgroup>

        <section>
            <div class="grid">
                <div>
                    <button id="run-button" onclick="startAutomation()">Run Enrollment Schedule</button>
                    <p>Status: <span id="status-indicator" class="status-idle">Idle</span></p>
                </div>
            </div>
        </section>

        <section>
            <h4>Live Output</h4>
            <div id="terminal">Waiting to start...</div>
        </section>
    </main>

    <script>
        const terminal = document.getElementById("terminal");
        const statusIndicator = document.getElementById("status-indicator");
        const runButton = document.getElementById("run-button");

        let ws = null;

        function updateStatus(state, text) {
            statusIndicator.className = `status-${state}`;
            statusIndicator.innerText = text;
            if (state === 'running') {
                runButton.setAttribute('disabled', 'true');
            } else {
                runButton.removeAttribute('disabled');
            }
        }

        function appendToTerminal(text) {
            // Append text
            terminal.innerHTML += text + "<br>";
            // Auto-scroll to bottom
            terminal.scrollTop = terminal.scrollHeight;
        }

        function startAutomation() {
            // Clear previous terminal output
            terminal.innerHTML = "";
            updateStatus("running", "Running...");

            // Determine WebSocket protocol based on page protocol
            const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
            const wsUrl = `${protocol}//${window.location.host}/ws/run`;

            ws = new WebSocket(wsUrl);

            ws.onmessage = function(event) {
                appendToTerminal(event.data);
            };

            ws.onclose = function(event) {
                // If it closed normally or due to completion
                if (terminal.innerHTML.includes("successfully")) {
                    updateStatus("success", "Completed Successfully");
                } else if (terminal.innerHTML.includes("failed") || terminal.innerHTML.includes("Error")) {
                    updateStatus("error", "Failed");
                } else {
                    updateStatus("idle", "Disconnected");
                }
            };

            ws.onerror = function(error) {
                appendToTerminal("WebSocket Error: " + error);
                updateStatus("error", "Connection Error");
            };
        }
    </script>
</body>
</html>
